name: Release binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: git fetch --no-tags origin +main:refs/remotes/origin/main
      - run: bun run release:preflight
      - run: bun run check

  build:
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            output: asana-cli-darwin-arm64
          - target: bun-darwin-x64
            output: asana-cli-darwin-x64
          - target: bun-linux-arm64
            output: asana-cli-linux-arm64
          - target: bun-linux-x64-baseline
            output: asana-cli-linux-x64
          - target: bun-linux-arm64-musl
            output: asana-cli-linux-arm64-musl
          - target: bun-linux-x64-baseline-musl
            output: asana-cli-linux-x64-musl
          - target: bun-windows-x64-baseline
            output: asana-cli-windows-x64.exe
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run --no-env-file scripts/build.ts ${{ matrix.target }} dist/${{ matrix.output }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - run: cd dist && sha256sum * > SHA256SUMS
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --generate-notes \
            --verify-tag \
            --draft
      - name: Upload all release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" dist/* --repo "$GITHUB_REPOSITORY"
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false
